{% extends 'base.html' %}
{% block title %}Register Resource{% endblock %}
{% block page_title %}Register Resource{% endblock %}

{% block content %}
<div style="max-width:640px;">
  <div class="page-header">
    <div>
      <h2>Register a Resource</h2>
      <p>Add available supplies to the relief network</p>
    </div>
    <a href="{{ url_for('main.resources') }}" class="btn btn-secondary">← Back</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="POST" action="{{ url_for('main.add_resource') }}">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Resource name <span class="required">*</span></label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Rice Bags" required>
          </div>
          <div class="form-group">
            <label class="form-label">Category <span class="required">*</span></label>
            <select name="type" class="form-control" required>
              <option value="">Select type</option>
              <option value="food">Food</option>
              <option value="water">Water</option>
              <option value="medicine">Medicine</option>
              <option value="clothing">Clothing</option>
              <option value="shelter_item">Shelter Item</option>
              <option value="equipment">Equipment</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Quantity <span class="required">*</span></label>
            <input type="number" name="quantity" class="form-control" placeholder="e.g. 100" min="1" required>
          </div>
          <div class="form-group">
            <label class="form-label">Unit <span class="required">*</span></label>
            <input type="text" name="unit" class="form-control" placeholder="kg / litres / kits / units" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Storage location <span class="required">*</span></label>
            <input type="text" name="location" class="form-control" placeholder="Warehouse / Area name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Disaster type</label>
            <select name="disaster_type" class="form-control">
              <option value="general">General</option>
              <option value="flood">Flood</option>
              <option value="landslide">Landslide</option>
              <option value="cyclone">Cyclone</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Additional notes</label>
          <textarea name="notes" class="form-control" rows="3" placeholder="Any special conditions or details..."></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Register Resource</button>
          <a href="{{ url_for('main.resources') }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
